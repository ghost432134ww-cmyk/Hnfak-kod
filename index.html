<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNFAK AI VADİ</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0a0a0a; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        header { background: #1a1a1a; padding: 15px; display: flex; gap: 10px; border-bottom: 2px solid #333; align-items: center; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: #0f0; outline: none; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        main { display: flex; flex: 1; overflow: hidden; }
        textarea { flex: 1; background: #1e1e1e; color: #9cdcfe; border: none; padding: 15px; font-family: monospace; resize: none; outline: none; }
        iframe { flex: 1; background: white; border: none; }
    </style>
</head>
<body>
<header>
    <div style="color:#007acc; font-weight:bold;">HNFAK</div>
    <input type="text" id="p" placeholder="İsteğini yaz kanka...">
    <button onclick="go()">YAZDIR</button>
</header>
<main>
    <textarea id="c" spellcheck="false"></textarea>
    <iframe id="v"></iframe>
</main>
<script>
    const KEY = "AIzaSyBgw8n9OtmEWdbsJCDLSaemk-Zqlnh0fRg";
    async function go() {
        const p = document.getElementById('p').value;
        const btn = document.querySelector('button');
        if(!p) return;
        btn.innerText = "YAZILIYOR...";
        try {
            // v1 yerine v1beta ve flash modelini kullanıyoruz
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Sadece HTML/CSS/JS kodu ver. İstek: ${p}` }] }] })
            });
            const d = await r.json();
            let code = d.candidates[0].content.parts[0].text.replace(/```html|```javascript|```css|```/g, "").trim();
            document.getElementById('c').value = code;
            const doc = document.getElementById('v').contentDocument;
            doc.open(); doc.write(code); doc.close();
        } catch (e) { alert("Bağlantı hatası! Sadece HTTPS üzerinden çalışır."); }
        btn.innerText = "YAZDIR";
    }
</script>
</body>
</html>
