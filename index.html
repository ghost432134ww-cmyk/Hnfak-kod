<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNFAK AI - FINAL DESTINY</title>
    <style>
        :root { --bg: #020617; --p: #1e293b; --a: #38bdf8; --t: #f1f5f9; }
        body, html { margin:0; padding:0; height:100%; font-family:sans-serif; background:var(--bg); color:var(--t); overflow:hidden; }
        header { height:60px; background:var(--p); display:flex; align-items:center; padding:0 15px; gap:10px; border-bottom:1px solid #334155; }
        input { flex:1; background:#000; border:1px solid #334155; color:#fff; padding:10px; border-radius:5px; outline:none; }
        button { background:var(--a); border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer; min-width: 120px; }
        main { display:flex; height:calc(100vh - 60px); }
        textarea { flex:1; background:#000; color:var(--a); padding:15px; font-family:monospace; border:none; outline:none; resize:none; font-size: 13px; border-right: 1px solid #334155; }
        iframe { flex:1; background:#fff; border:none; }
        @media (max-width:768px) { main { flex-direction:column; } }
    </style>
</head>
<body>

<header>
    <b style="color:var(--a)">HNFAK AI</b>
    <input type="text" id="p" placeholder="Örn: Modern bir hesap makinesi yap">
    <button id="b" onclick="generate()">YAZDIR</button>
</header>

<main>
    <textarea id="e" placeholder="Kodlar buraya gelecek..."></textarea>
    <iframe id="v"></iframe>
</main>

<script>
    const API_KEY = "AIzaSyBgw8n9OtmEWdbsJCDLSaemk-Zqlnh0fRg";
    
    // Dünyadaki tüm olası Gemini model varyasyonlarını yazdım amk
    const MODELS = [
        "gemini-1.5-flash-latest",
        "gemini-1.5-flash",
        "gemini-1.5-flash-8b",
        "gemini-pro",
        "gemini-1.0-pro"
    ];

    async function generate() {
        const prompt = document.getElementById('p').value;
        const btn = document.getElementById('b');
        const editor = document.getElementById('e');
        const viewer = document.getElementById('v');

        if(!prompt) return alert("Boş bırakma kanka!");
        
        btn.disabled = true;
        editor.value = "Modeller tek tek taranıyor, bu işlem biraz sürebilir...";

        let success = false;

        for (let model of MODELS) {
            btn.innerText = "Deneniyor: " + model;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt + ". Sadece tek bir HTML dosyası ver, asla açıklama yapma." }] }]
                    })
                });

                const data = await res.json();

                if (data.candidates && data.candidates[0].content) {
                    let code = data.candidates[0].content.parts[0].text;
                    // Markdown temizle
                    code = code.replace(/```html|```javascript|```css|```/gi, '').trim();
                    editor.value = code;
                    
                    const d = viewer.contentDocument;
                    d.open(); d.write(code); d.close();
                    
                    success = true;
                    console.log("Çalışan model bulundu: " + model);
                    break;
                } else {
                    console.warn(model + " yanıt vermedi, sıradakine geçiliyor...");
                }
            } catch (err) {
                console.error(model + " bağlantı hatası.");
            }
        }

        if (!success) {
            editor.value = "HATA: Hiçbir model (Flash, Pro, 8b) yanıt vermedi. \n\n1. API Key'in aktif olduğundan emin ol.\n2. Google Cloud'dan 'Generative Language API' servisini etkinleştirip etkinleştirmediğini kontrol et.";
            alert("Tüm modeller denendi ama sonuç alınamadı. Konsolu (F12) kontrol et.");
        }

        btn.disabled = false;
        btn.innerText = "YAZDIR";
    }

    // Manuel düzenleme desteği
    document.getElementById('e').addEventListener('input', (i) => {
        const d = document.getElementById('v').contentDocument;
        d.open(); d.write(i.target.value); d.close();
    });
</script>
</body>
</html>
