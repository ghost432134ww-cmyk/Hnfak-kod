<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNFAK AI - SORUN ÇÖZÜCÜ</title>
    <style>
        :root { --bg: #020617; --p: #1e293b; --a: #38bdf8; --t: #f1f5f9; }
        body, html { margin:0; padding:0; height:100%; font-family:sans-serif; background:var(--bg); color:var(--t); overflow:hidden; }
        header { height:60px; background:var(--p); display:flex; align-items:center; padding:0 15px; gap:10px; border-bottom:1px solid #334155; }
        input { flex:1; background:#000; border:1px solid #334155; color:#fff; padding:10px; border-radius:5px; outline:none; }
        button { background:var(--a); border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer; }
        main { display:flex; height:calc(100vh - 60px); }
        textarea { flex:1; background:#000; color:var(--a); padding:15px; font-family:monospace; border:none; outline:none; resize:none; }
        iframe { flex:1; background:#fff; border:none; }
        @media (max-width:768px) { main { flex-direction:column; } }
    </style>
</head>
<body>

<header>
    <b style="color:var(--a)">HNFAK AI</b>
    <input type="text" id="p" placeholder="Hesap makinesi yap...">
    <button id="b" onclick="generate()">YAZDIR</button>
</header>

<main>
    <textarea id="e" placeholder="Kodlar buraya gelecek..."></textarea>
    <iframe id="v"></iframe>
</main>

<script>
    const API_KEY = "AIzaSyBgw8n9OtmEWdbsJCDLSaemk-Zqlnh0fRg";
    
    async function generate() {
        const prompt = document.getElementById('p').value;
        const btn = document.getElementById('b');
        const editor = document.getElementById('e');
        const viewer = document.getElementById('v');

        if(!prompt) return;
        btn.disabled = true;
        btn.innerText = "Sorgulanıyor...";
        editor.value = "Gemini ile bağlantı kuruluyor...";

        try {
            // Model ismini en güncel haline çektik
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt + ". Sadece HTML kodu ver." }] }]
                })
            });

            const data = await res.json();

            if (data.error) {
                let msg = "HATA: ";
                if(data.error.status === "PERMISSION_DENIED") msg += "API Anahtarı geçersiz veya kısıtlı!";
                else if(data.error.status === "RESOURCE_EXHAUSTED") msg += "Kota doldu, biraz bekle.";
                else msg += data.error.message;
                editor.value = msg;
                alert(msg);
            } else if (data.candidates && data.candidates[0].content) {
                let code = data.candidates[0].content.parts[0].text;
                code = code.replace(/```html|```javascript|```css|```/gi, '').trim();
                editor.value = code;
                const d = viewer.contentDocument;
                d.open(); d.write(code); d.close();
            } else {
                editor.value = "Anlaşılamayan bir yanıt geldi.";
            }
        } catch (err) {
            editor.value = "Bağlantı koptu: " + err.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "YAZDIR";
        }
    }
</script>
</body>
</html>
