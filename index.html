<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNFAK AI - Kod Editörü</title>
    <style>
        /* CSS: Modern Dark Mode Tasarımı */
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f1f5f9;
            --border-color: #334155;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* Header ve Input Alanı */
        header {
            height: 60px;
            background: var(--panel-bg);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
        }

        .logo {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 1.2rem;
            min-width: 100px;
        }

        .prompt-container {
            flex-grow: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            outline: none;
        }

        button {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { background: #64748b; cursor: not-allowed; }

        /* Ana Panel Yapısı */
        main {
            display: flex;
            height: calc(100vh - 60px);
        }

        .editor-section, .preview-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        textarea {
            width: 100%;
            height: 100%;
            background: #020617;
            color: #94a3b8;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            border: none;
            resize: none;
            outline: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            background: white;
            border: none;
        }

        .label {
            background: var(--border-color);
            padding: 5px 15px;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* Mobil Uyumluluk */
        @media (max-width: 768px) {
            main { flex-direction: column; }
            header { flex-direction: column; height: auto; padding: 10px; }
            .prompt-container { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">HNFAK AI</div>
    <div class="prompt-container">
        <input type="text" id="promptInput" placeholder="Nasıl bir kod yazdırmak istersiniz?">
        <button id="generateBtn" onclick="generateCode()">YAZDIR</button>
    </div>
</header>

<main>
    <div class="editor-section">
        <div class="label">HTML Kod Editörü</div>
        <textarea id="codeEditor" spellcheck="false" placeholder="Kodlar burada görünecek..."></textarea>
    </div>
    <div class="preview-section">
        <div class="label">Canlı Önizleme</div>
        <iframe id="preview"></iframe>
    </div>
</main>

<script>
    // Konfigürasyon
    const API_KEY = "AIzaSyBgw8n9OtmEWdbsJCDLSaemk-Zqlnh0fRg";
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    const codeEditor = document.getElementById('codeEditor');
    const preview = document.getElementById('preview');
    const btn = document.getElementById('generateBtn');

    // Güvenlik Kontrolü: HTTPS sorgusu
    if (window.location.protocol === 'http:' && window.location.hostname !== 'localhost') {
        alert("Dikkat: API istekleri sadece HTTPS üzerinden veya localhost'ta güvenle çalışır.");
    }

    // Kodun önizlemede çalıştırılması
    function updatePreview(code) {
        const previewDoc = preview.contentDocument || preview.contentWindow.document;
        previewDoc.open();
        previewDoc.write(code);
        previewDoc.close();
    }

    // Markdown temizleme fonksiyonu
    function cleanMarkdown(text) {
        // ```html veya ``` kod bloklarını kaldırır
        return text.replace(/```html|```javascript|```css|```/gi, '').trim();
    }

    async function generateCode() {
        const prompt = document.getElementById('promptInput').value;
        if (!prompt) return alert("Lütfen bir açıklama girin.");

        btn.disabled = true;
        btn.innerText = "Yazılıyor...";

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `${prompt}. Lütfen sadece HTML, CSS ve JS içeren tek bir kod bloğu ver.` }]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                let aiCode = data.candidates[0].content.parts[0].text;
                
                // Temizleme ve Ekrana Basma
                const cleanedCode = cleanMarkdown(aiCode);
                codeEditor.value = cleanedCode;
                updatePreview(cleanedCode);
            } else {
                throw new Error("API'den geçersiz yanıt geldi.");
            }

        } catch (error) {
            console.error(error);
            alert("Hata oluştu: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "YAZDIR";
        }
    }

    // Editörde manuel değişiklik yapıldığında önizlemeyi güncelle
    codeEditor.addEventListener('input', () => {
        updatePreview(codeEditor.value);
    });
</script>

</body>
</html>
