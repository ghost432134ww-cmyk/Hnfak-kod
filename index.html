<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNFAK AI - %100 ÇALIŞAN VERSİYON</title>
    <style>
        :root { --bg: #020617; --p: #1e293b; --a: #38bdf8; --t: #f1f5f9; }
        body, html { margin:0; padding:0; height:100%; font-family:sans-serif; background:var(--bg); color:var(--t); overflow:hidden; }
        header { height:60px; background:var(--p); display:flex; align-items:center; padding:0 15px; gap:10px; border-bottom:1px solid #334155; }
        input { flex:1; background:#000; border:1px solid #334155; color:#fff; padding:10px; border-radius:5px; outline:none; }
        button { background:var(--a); border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer; }
        main { display:flex; height:calc(100vh - 60px); }
        textarea { flex:1; background:#000; color:var(--a); padding:15px; font-family:monospace; border:none; outline:none; resize:none; font-size:13px; border-right:1px solid #334155; }
        iframe { flex:1; background:#fff; border:none; }
        @media (max-width:768px) { main { flex-direction:column; } }
    </style>
</head>
<body>

<header>
    <b style="color:var(--a)">HNFAK AI</b>
    <input type="text" id="p" placeholder="Bana bir Yılan Oyunu yap...">
    <button id="b" onclick="generate()">YAZDIR</button>
</header>

<main>
    <textarea id="e" placeholder="Kodlar burada görünecek..."></textarea>
    <iframe id="v"></iframe>
</main>

<script>
    const API_KEY = "AIzaSyBgw8n9OtmEWdbsJCDLSaemk-Zqlnh0fRg";
    
    // GOOGLE'IN İSTEDİĞİ EN DOĞRU ENDPOINT VE MODEL FORMATI
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    async function generate() {
        const prompt = document.getElementById('p').value;
        const btn = document.getElementById('b');
        const editor = document.getElementById('e');
        const viewer = document.getElementById('v');

        if(!prompt) return alert("Kanka bir şeyler yaz!");
        
        btn.disabled = true;
        btn.innerText = "Yazıyor...";
        editor.value = "Google Gemini ile bağlantı kuruluyor, lütfen bekle...";

        try {
            const response = await fetch(URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: prompt + " . Sadece HTML, CSS ve JavaScript kodunu içeren tek bir HTML dosyası ver. Açıklama yapma, sadece kod." }]
                    }]
                })
            });

            const data = await response.json();

            if (data.candidates && data.candidates[0].content) {
                let code = data.candidates[0].content.parts[0].text;
                
                // Markdown işaretlerini temizle
                code = code.replace(/```html|```javascript|```css|```/gi, '').trim();
                
                editor.value = code;
                
                // Önizlemeyi güncelle
                const doc = viewer.contentDocument;
                doc.open();
                doc.write(code);
                doc.close();
            } else {
                // Hata mesajını detaylı göster
                const errorInfo = data.error ? data.error.message : "Geçersiz yanıt.";
                editor.value = "HATA: " + errorInfo;
                alert("Hata: " + errorInfo);
            }
        } catch (err) {
            editor.value = "Bağlantı Hatası: " + err.message;
            alert("Bağlantı kurulamadı!");
        } finally {
            btn.disabled = false;
            btn.innerText = "YAZDIR";
        }
    }

    // Editörden manuel düzeltme yaparsan önizleme güncellenir
    document.getElementById('e').addEventListener('input', (i) => {
        const doc = document.getElementById('v').contentDocument;
        doc.open();
        doc.write(i.target.value);
        doc.close();
    });
</script>
</body>
</html>
