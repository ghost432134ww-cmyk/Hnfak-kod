<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNFAK AI - Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f1f5f9;
            --border-color: #334155;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg-color); color: var(--text-color); overflow: hidden; }

        header {
            height: 70px; background: var(--panel-bg); display: flex; align-items: center;
            padding: 0 20px; border-bottom: 1px solid var(--border-color); gap: 15px;
        }

        .logo { font-weight: bold; color: var(--accent-color); font-size: 1.2rem; }
        .input-group { flex-grow: 1; display: flex; gap: 10px; }
        input { flex-grow: 1; background: #020617; border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 6px; outline: none; }
        button { background: var(--accent-color); color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; }

        main { display: flex; height: calc(100vh - 70px); }
        .box { flex: 1; display: flex; flex-direction: column; border: 1px solid var(--border-color); }
        .label { background: var(--border-color); padding: 5px 10px; font-size: 11px; font-weight: bold; }
        textarea { flex: 1; background: #020617; color: #38bdf8; padding: 15px; font-family: monospace; border: none; outline: none; font-size: 14px; }
        iframe { flex: 1; background: white; border: none; }

        @media (max-width: 768px) {
            main { flex-direction: column; }
            header { height: auto; padding: 15px; flex-wrap: wrap; }
            .input-group { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">HNFAK AI</div>
    <div class="input-group">
        <input type="text" id="promptInput" placeholder="Kanka, ne yazalım? (Örn: Neon bir buton yap)">
        <button id="btn" onclick="askGemini()">YAZDIR</button>
    </div>
</header>

<main>
    <div class="box">
        <div class="label">KOD EDİTÖRÜ</div>
        <textarea id="editor" spellcheck="false"></textarea>
    </div>
    <div class="box">
        <div class="label">ÖNİZLEME</div>
        <iframe id="viewer"></iframe>
    </div>
</main>

<script>
    const API_KEY = "AIzaSyBgw8n9OtmEWdbsJCDLSaemk-Zqlnh0fRg";
    // v1beta ve model ismini garantiye alıyoruz
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    function cleanCode(text) {
        // Markdown bloklarını (```html ... ```) temizler
        return text.replace(/```html|```javascript|```css|```/gi, '').replace(/```/g, '').trim();
    }

    function renderPreview(code) {
        const doc = document.getElementById('viewer').contentDocument;
        doc.open();
        doc.write(code);
        doc.close();
    }

    async function askGemini() {
        const prompt = document.getElementById('promptInput').value;
        const btn = document.getElementById('btn');
        const editor = document.getElementById('editor');

        if(!prompt) return;

        btn.disabled = true;
        btn.innerText = "Yazıyor...";

        try {
            const response = await fetch(URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt + ". Sadece kod ver, açıklama yapma." }] }],
                    // Güvenlik ayarlarını gevşeterek engellenme ihtimalini düşürüyoruz
                    safetySettings: [
                        { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                    ]
                })
            });

            const data = await response.json();

            // Hata ayıklama için konsola basıyoruz
            console.log("Gemini Yanıtı:", data);

            if (data.candidates && data.candidates[0].content) {
                const rawCode = data.candidates[0].content.parts[0].text;
                const finalCode = cleanCode(rawCode);
                editor.value = finalCode;
                renderPreview(finalCode);
            } else if (data.error) {
                alert("API Hatası: " + data.error.message);
            } else {
                alert("Filtre Hatası: Gemini bu isteğe cevap vermeyi reddetti (Güvenlik filtreleri).");
            }

        } catch (err) {
            alert("Bağlantı Hatası: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "YAZDIR";
        }
    }

    editor.addEventListener('input', () => renderPreview(editor.value));
</script>

</body>
</html>
